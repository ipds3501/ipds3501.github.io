<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SijiAE - Login</title>
    <!-- Bootstrap 5 CSS - Diperbaiki integrity-nya -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #007BFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container Login Utama */
        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            border: 1px solid #e0e0e0;
        }

        .fantasy {
            font-family: 'Copperplate', 'Papyrus', fantasy;
        }

        .animate-character {
            text-transform: uppercase;
            background-image: linear-gradient(
                -225deg,
                #231557 0%,
                #44107a 29%,
                #ff1361 67%,
                #fff800 100%
            );
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textclip 3s linear infinite;
            display: inline-block;
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        @keyframes textclip {
            to { background-position: 200% center; }
        }

        /* Typewriter Styling */
        .typewriter-box {
            height: 24px;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #777;
        }

        .typewriter-box span {
            border-right: 3px solid #777;
            padding-right: 5px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #777; }
        }

        /* Form Styling */
        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 5px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
            border-color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .error-text {
            color: #d93025;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        /* View Control */
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <!-- View Login -->
    <div id="login-view" class="view active">
        <div class="login-card">
            <div class="text-center">
                <span class="animate-character fantasy">Sij1-AE</span>
                <div class="typewriter-box">
                    <span id="typewriter-text" data-words="BPS 3501, Profesional, Integritas, Amanah"></span>
                </div>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                </div>

                <button type="submit" class="btn-login">Masuk ke Sistem</button>
            </form>
            <div id="errorMessage" class="error-text"></div>
        </div>
    </div>

    <!-- View Dashboard (Setelah Login) -->
    <div id="dashboard-view" class="view container mt-5">
        <div class="card shadow p-5 text-center border-0 rounded-4">
            <h2 class="text-success mb-3">Selamat Datang!</h2>
            <p class="text-muted">Anda berhasil masuk ke dashboard <strong>SijiAE</strong>.</p>
            <div class="py-4">
                <div class="badge bg-primary p-2 px-3">Status: Admin Aktif</div>
            </div>
            <button onclick="logout()" class="btn btn-outline-danger mt-3">Keluar Sistem</button>
        </div>
    </div>

    <script>
        // --- Logika Typewriter ---
        const textElement = document.getElementById('typewriter-text');
        const words = textElement.getAttribute('data-words').split(', ');
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            
            // Ubah warna berdasarkan kata
            textElement.style.color = "#777";
            if (currentWord === "Profesional") textElement.style.color = "#0d6efd";
            if (currentWord === "Integritas") textElement.style.color = "#198754";
            if (currentWord === "Amanah") textElement.style.color = "#ffc107";

            if (isDeleting) {
                textElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000; // Diam sebentar di akhir kata
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        // Mulai animasi
        window.onload = type;

        // --- Logika Login ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // Kredensial Statis
            if (user === 'admin3501' && pass === 'ronggowarsito2') {
                document.getElementById('login-view').classList.remove('active');
                document.getElementById('dashboard-view').classList.add('active');
                errorMsg.textContent = "";
            } else {
                errorMsg.textContent = "Username atau password salah!";
                
                // Efek getar sederhana
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(5px)';
                setTimeout(() => card.style.transform = 'translateX(-5px)', 50);
                setTimeout(() => card.style.transform = 'translateX(0)', 100);
            }
        });

        function logout() {
            document.getElementById('dashboard-view').classList.remove('active');
            document.getElementById('login-view').classList.add('active');
            document.getElementById('loginForm').reset();
        }
    </script>
</body>
</html>
